<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Bozha</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="./asset/logoBozha.png" />
    <script defer src="index.js"></script>
  </head>
  <body>
    <main>
      <div class="container-of-menu">
        <div class="container-btn-language">
          <button type="button" id="btn-spanish">Español</button>
          <button type="button" id="btn-english">English</button>
        </div>
        <div class="container-content content-spanish menu active">
          <img
            src="./asset/spanish/café-español.jpg"
            alt="Imagen del Menú de café en español"
          />
          <img
            src="./asset/spanish/desayunos-español.jpg"
            alt="Imagen del Menú de los desayunos en español"
          />
          <img
            src="./asset/spanish/brunch-español.jpg"
            alt="Imagen del Menú de Brunch"
          />
          <img
            src="./asset/spanish/licor-español.jpg"
            alt="Imagen del Menú de Licor en español"
          />
        </div>
        <div class="container-content content-english menu">
          <img
            src="./asset/english/café-inglés.jpg"
            alt="Imagen del Menú de café en inglés"
          />
          <img
            src="./asset/english/Breakfast-inglés.jpg"
            alt="Imagen del Menú de los desayunos en inglés"
          />
          <img
            src="./asset/english/brunch-inglés.jpg"
            alt="Imagen del Menú de los Brunch en inglés"
          />
          <img
            src="./asset/english/licor-inglés.jpg"
            alt="Imagen del Menú del Licor en inglés"
          />
        </div>
      </div>
    </main>
  </body>
</html>
