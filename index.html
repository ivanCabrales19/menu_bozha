<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Menú Bozha" />
    <meta
      property="og:description"
      content="Menú de bebdidas de café, desayunos, sandwich, jugos, cócteles y más."
    />
    <meta
      property="og:image"
      content="https://res.cloudinary.com/do9gbwaoj/image/upload/v1774622707/logoBozha_mxl1om.png"
    />
    <title>Menu Bozha</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="./asset/logoBozha.png" />
    <script defer src="index.js"></script>
  </head>
  <body>
    <main>
      <div class="container-of-menu">
        <div class="container-btn-language">
          <button
            type="button"
            id="btn-spanish"
            aria-label="boton para cambiar idioma a españaol"
          >
            Español
          </button>
          <button
            type="button"
            id="btn-english"
            aria-label="boton para cambiar idioma a inglés"
          >
            English
          </button>
        </div>
        <div class="container-content content-spanish menu active">
          <img
            src="./asset/spanish/BozhaMenu_2026Bebidas.png"
            alt="Imagen del Menú de bebdidas de café en español"
          />
          <img
            src="./asset/spanish/BozhaMenu_2026Comida.png"
            alt="Imagen del Menú de los desayunos en español"
          />
          <img
            src="./asset/spanish/BrunchEspañol.png"
            alt="Imagen del Menú Brunch"
          />
          <img
            src="./asset/spanish/licorEspañol.png"
            alt="Imagen del Menú de Licor en español y cócteles"
          />
        </div>
        <div class="container-content content-english menu">
          <img
            src="./asset/english/BozhaMenu_2026InglesBebidas.png"
            alt="Imagen del Menú de bebidas de café en inglés"
          />
          <img
            src="./asset/english/BozhaMenu_2026InglesComida.png"
            alt="Imagen del Menú de los desayunos en inglés"
          />
          <img
            src="./asset/english/BrunchInglés.png"
            alt="Imagen del Menú Brunch en inglés"
          />
          <img
            src="./asset/english/licorInglés.png"
            alt="Imagen del Menú de Licor y cócteles en inglés"
          />
        </div>
      </div>
    </main>
  </body>
</html>
